<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>毕业班华文资源库</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #3498db; color: white; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        .vocab-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .vocab-card { padding: 15px; border-left: 5px solid #3498db; background: #f9f9f9; border-radius: 4px; }
        .word { font-size: 24px; color: #e67e22; font-weight: bold; }
        .pinyin { color: #7f8c8d; font-style: italic; margin-left: 10px; }
        .meaning { display: block; margin-top: 5px; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 毕业班华文资源库</h1>
    
    <div class="controls">
        <select id="levelSelect">
            <option value="Level 1">Level 1 Vocabulary</option>
            </select>
        <button onclick="drawTen()">抽取 10 个词语</button>
    </div>

    <div id="displayArea" class="vocab-grid">
        <p>点击上方按钮开始复习！</p>
    </div>
</div>

<script src="data.js"></script>

<script>
function drawTen() {
    const level = document.getElementById('levelSelect').value;
    const allWords = vocabData[level];
    
    // Shuffle
    const shuffled = [...allWords].sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, 10);
    
    // Display
    const area = document.getElementById('displayArea');
    area.innerHTML = ''; // Clear previous
    
    selected.forEach(item => {
        const div = document.createElement('div');
        div.className = 'vocab-card';
        div.innerHTML = `
            <span class="word">${item.word}</span>
            <span class="pinyin">${item.pinyin}</span>
            <span class="meaning">${item.meaning}</span>
        `;
        area.appendChild(div);
    });
}
</script>

</body>
</html>
