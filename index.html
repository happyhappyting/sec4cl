<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文总复习</title>
    <style>
        :root {
            --bg-color: #d8e2dc; --forest-green: #1b4332; --sea-blue: #0077b6; 
            --rose: #e91e63; --glass: rgba(255, 255, 255, 0.7);
            --paper-bg: #fffcf2; --brown: #5d4037;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif;
            background-color: var(--bg-color); color: var(--forest-green);
            padding: 20px; margin: 0; line-height: 1.8;
        }

        .container {
            max-width: 950px; margin: 0 auto;
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 30px; border-radius: 30px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { text-align: center; color: var(--forest-green); font-size: 2.2em; margin-bottom: 30px; letter-spacing: 2px; }

        /* 倒计时 */
        .header-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .cd-item { background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid rgba(233, 30, 99, 0.2); }
        .cd-item b { display: block; color: var(--forest-green); margin-bottom: 5px; }
        .days { font-size: 28px; font-weight: bold; color: var(--rose); margin: 0 4px; }

        /* 模块样式 */
        .section-box { margin-bottom: 25px; padding: 25px; background: rgba(255, 255, 255, 0.3); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.4); }
        h2 { color: var(--sea-blue); margin: 0 0 18px 0; font-size: 1.5em; border-left: 5px solid var(--sea-blue); padding-left: 12px; }
        
        .nav-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; }
        .nav-btn { padding: 10px 20px; border-radius: 12px; border: 2px solid var(--forest-green); background: white; color: var(--forest-green); cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn.active, .nav-btn:hover { background: var(--forest-green); color: white; }
        .select-box { padding: 10px 15px; border-radius: 12px; border: 2px solid var(--sea-blue); font-weight: bold; color: var(--sea-blue); background: white; cursor: pointer; }

        /* 纸片质感与空格处理 */
        .paper-effect {
            background: var(--paper-bg); padding: 30px; border-radius: 4px;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.06); 
            border-left: 8px solid var(--sea-blue);
            color: #333; font-size: 18px; line-height: 2; white-space: pre-wrap; margin-top: 15px;
        }
        
        /* 模拟中文填空空格：宽度足够，带下划线 */
        .ch-space {
            display: inline-block;
            min-width: 3em; /* 至少三个字的宽度 */
            border-bottom: 2px solid #555;
            margin: 0 4px;
            vertical-align: bottom;
            height: 1.2em;
        }

        .paper-effect b { color: #000; font-weight: bold; background: linear-gradient(transparent 70%, #fff176 70%); }
        .hl { background: #fff176; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

        /* 词语卡片 */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .vocab-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.04); cursor: pointer; }
        .word { font-size: 22px; color: var(--forest-green); font-weight: bold; display: block; }
        .det { margin-top: 10px; border-top: 1px dashed #ddd; padding-top: 10px; color: var(--brown); }
        .pinyin { font-size: 15px; font-style: italic; display: block; margin-bottom: 5px; }
        .meaning-text { font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 华文总复习</h1>

    <div class="header-box">
        <div class="cd-item"><b>卷一 & 卷二</b><div>还有<span id="cd1" class="days">--</span>天</div></div>
        <div class="cd-item"><b>卷三 听力</b><div>还有<span id="cd2" class="days">--</span>天</div></div>
        <div class="cd-item"><b>卷三 口试</b><div>还有<span id="cd3" class="days">--</span>天</div></div>
    </div>

    <div class="section-box">
        <h2>📄 卷一 写作技巧</h2>
        <div class="nav-group">
            <button class="nav-btn" onclick="route('q1', this)">私人电邮</button>
            <button class="nav-btn" onclick="route('q2', this)">公务电邮</button>
            <button class="nav-btn" onclick="route('q3', this)">记叙文</button>
            <button class="nav-btn" onclick="route('q4', this)">议论文</button>
            <button class="nav-btn" onclick="route('q5', this)">材料作文</button>
        </div>
        <div id="display-area"></div>
    </div>

    <div class="section-box">
        <h2>🏷️ 核心词语复习</h2>
        <div class="nav-group">
            <select id="grade-select" class="select-box" onchange="renderVocab('all')">
                <option value="all">所有年级 (All)</option>
                <option value="Level 1">一年级 (Level 1)</option>
                <option value="Level 2">二年级 (Level 2)</option>
                <option value="Level 3">三年级 (Level 3)</option>
            </select>
            <button class="nav-btn" onclick="renderVocab('all')">👁️ 显示全部</button>
            <button class="nav-btn" onclick="renderVocab('random')">🎲 随机10个</button>
        </div>
        <div id="vocab-display" class="vocab-grid"></div>
    </div>
</div>

<script src="data.js"></script>
<script src="data_q1.js"></script>
<script src="data_q2.js"></script>
<script src="data_q3.js"></script>
<script src="data_q4.js"></script>
<script src="data_q5.js"></script>

<script>
"use strict";

// 增强格式化：处理填空空格
function formatContent(text) {
    if (!text) return "";
    // 将 ( ) [ ] 或 连续三个以上的空格 替换为试卷风格的下划线空格
    let formatted = text.replace(/\[\s*\]|\(\s*\)|_{3,}| {3,}/g, '<span class="ch-space"></span>');
    return formatted;
}

function route(type, btn) {
    document.querySelectorAll('.nav-group .nav-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    const area = document.getElementById('display-area');
    let data = window[type + 'Data']; 

    if (!data) {
        area.innerHTML = `<div class="paper-effect">❌ 未找到 data_${type}.js 的数据变量。</div>`;
        return;
    }

    if (type === 'q1' || type === 'q2') {
        area.innerHTML = `<div class="paper-effect">${formatContent(data.example)}${formatContent(data.answer)}</div>`;
    } else if (type === 'q3') { renderQ3Menu(data); }
    else if (type === 'q4') { renderQ4Menu(data); }
    else if (type === 'q5') { renderQ5Menu(data); }
}

function renderQ3Menu(data) {
    document.getElementById('display-area').innerHTML = `
        <div class="nav-group" style="margin-top:10px;">
            <button class="nav-btn" onclick="showSub('tips', this, 'q3')">💡 技巧</button>
            <button class="nav-btn" onclick="showSub('vocab', this, 'q3')">📝 词库</button>
            <button class="nav-btn" onclick="showSub('essay', this, 'q3')">📖 范文</button>
        </div>
        <div id="sub-area"></div>`;
    showSub('tips', document.querySelector('#display-area .nav-btn'), 'q3');
}

function showSub(sub, btn, qType) {
    const inner = document.getElementById('sub-area');
    const data = window[qType + 'Data'];
    if (btn) {
        btn.parentElement.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    if (sub === 'tips') {
        let h = `<div class="paper-effect"><b>建议：</b>${data.strategies.examTips}<hr>`;
        data.strategies.openings.forEach(o => h += `<p><span class="hl">${o.title}</span><br>${o.example}</p>`);
        inner.innerHTML = h + `</div>`;
    } else if (sub === 'vocab') {
        let h = `<div class="vocab-grid">`;
        [...data.traits, ...data.emotions].forEach(v => {
            h += `<div class="vocab-card" onclick="handleVocabClick(this, '${v.word}')">
                    <span class="word">${v.word}</span>
                    <div class="det" style="display:none">
                        <span class="pinyin">${v.pinyin}</span>
                        <div class="meaning-text">${v.meaning}</div>
                    </div>
                  </div>`;
        });
        inner.innerHTML = h + `</div>`;
    } else {
        inner.innerHTML = `<div class="paper-effect"><h3>${data.modelEssay.title}</h3>${formatContent(data.modelEssay.content)}</div>`;
    }
}

function handleVocabClick(el, word) {
    const d = el.querySelector('.det');
    const isShowing = d.style.display === 'block';
    d.style.display = isShowing ? 'none' : 'block';
    if (!isShowing) {
        const msg = new SpeechSynthesisUtterance(word);
        msg.lang = "zh-CN";
        speechSynthesis.speak(msg);
    }
}

function renderVocab(mode) {
    const area = document.getElementById('vocab-display');
    const selectedLevel = document.getElementById('grade-select').value;
    area.innerHTML = '';
    
    if (typeof vocabData === "undefined") return;

    let pool = [];
    if (selectedLevel === 'all') {
        Object.keys(vocabData).forEach(key => { pool = pool.concat(vocabData[key]); });
    } else {
        // 关键修正：匹配 Level 1, Level 2 等
        pool = vocabData[selectedLevel] || [];
    }

    let list = (mode === 'random') ? [...pool].sort(() => 0.5 - Math.random()).slice(0, 10) : pool;

    list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'vocab-card';
        card.onclick = () => handleVocabClick(card, item.word);
        card.innerHTML = `
            <span class="word">${item.word}</span>
            <div class="det" style="display:none">
                <span class="pinyin">${item.pinyin}</span>
                <div class="meaning-text">${item.meaning}</div>
            </div>`;
        area.appendChild(card);
    });
}

// Q4 & Q5
function renderQ4Menu(data){
    document.getElementById('display-area').innerHTML = `<div class="nav-group"><button class="nav-btn" onclick="showQ4Sub('review', this)">复习</button><button class="nav-btn" onclick="showQ4Sub('opinion', this)">看法类</button></div><div id="sub-area"></div>`;
    showQ4Sub('review', document.querySelector('#display-area .nav-btn'));
}
function showQ4Sub(sub, btn){
    const inner = document.getElementById('sub-area');
    if (btn) { btn.parentElement.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    const d = q4Data[sub];
    let h = `<div class="paper-effect"><h3>${d.title}</h3>`;
    if(sub === 'review'){ d.elements.forEach(e => h += `<p><b>${e.term}</b>: ${e.detail}</p>`); } 
    else { h += `<table><tr><th>步骤</th><th>内容</th></tr>`; d.framework.forEach(f => h += `<tr><td>${f.step}</td><td>${f.detail}</td></tr>`); h += `</table>`; }
    inner.innerHTML = h + `</div>`;
}
function renderQ5Menu(data){
    document.getElementById('display-area').innerHTML = `<div class="nav-group"><button class="nav-btn" onclick="showQ5Sub('definition', this)">定义</button><button class="nav-btn" onclick="showQ5Sub('argumentative', this)">议论</button></div><div id="sub-area"></div>`;
    showQ5Sub('definition', document.querySelector('#display-area .nav-btn'));
}
function showQ5Sub(sub, btn){
    const inner = document.getElementById('sub-area');
    if (btn) { btn.parentElement.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    const d = q5Data[sub];
    if(sub === 'definition'){ inner.innerHTML = `<div class="paper-effect"><h3>${d.title}</h3><ul>${d.rules.map(r=>`<li>${r}</li>`).join('')}</ul></div>`; }
    else { inner.innerHTML = `<div class="paper-effect"><h3>${d.title}</h3><p>${formatContent(d.example.material)}</p></div>`; }
}

window.onload = function() {
    const dates = { cd1: '2026-06-02', cd2: '2026-07-07', cd3: '2026-07-13' };
    for (let id in dates) {
        const diff = Math.ceil((new Date(dates[id]) - new Date()) / (1000 * 60 * 60 * 24));
        document.getElementById(id).innerText = diff > 0 ? diff : 0;
    }
    route('q1', document.querySelector('.nav-btn'));
    renderVocab('all');
};
</script>
</body>
</html>
