<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文总复习 | happyhappyting</title>
    <style>
        :root {
            --bg-color: #d8e2dc; 
            --forest-green: #1b4332; 
            --sea-blue: #0077b6; 
            --brown: #6d4c41; 
            --rose: #e91e63;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--forest-green);
            padding: 20px; margin: 0; line-height: 1.6;
        }

        .container {
            max-width: 950px; margin: 0 auto;
            background: var(--glass); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); padding: 30px;
            border-radius: 30px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { text-align: center; color: var(--forest-green); font-size: 2em; margin-bottom: 30px; }

        /* 倒计时 */
        .header-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .cd-item { background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--rose); }
        .days { display: block; font-size: 24px; font-weight: bold; color: var(--rose); }

        /* 导航 */
        .section-box { margin-bottom: 20px; padding: 20px; background: rgba(255, 255, 255, 0.3); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.4); }
        h2 { color: var(--sea-blue); cursor: pointer; margin: 0 0 15px 0; font-size: 1.4em; }
        .nav-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .nav-btn { padding: 8px 16px; border-radius: 10px; border: 2px solid var(--forest-green); background: white; color: var(--forest-green); cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn.active, .nav-btn:hover { background: var(--forest-green); color: white; }

        /* 纸张效果 */
        .paper-effect {
            background: #fffcf2; padding: 25px; border-radius: 12px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;
            color: #333; font-size: 16px; line-height: 1.8; white-space: pre-wrap; margin-top: 15px;
        }

        .hl-yellow { background: #fff176; padding: 2px 4px; border-radius: 3px; }
        .bold-text { font-weight: bold; color: #000; }

        /* 词语卡片 */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .vocab-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
        .word { font-size: 20px; color: var(--forest-green); font-weight: bold; display: block; }
        
        table { width: 100%; border-collapse: collapse; margin: 10px 0; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; font-size: 14px; text-align: left; }
        th { background: #f4f4f4; color: var(--forest-green); }

        #data-status { font-size: 11px; color: #888; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 华文总复习</h1>

    <div class="header-box">
        <div class="cd-item">卷一/二<span id="cd1" class="days">--</span></div>
        <div class="cd-item">听力 (7/7)<span id="cd2" class="days">--</span></div>
        <div class="cd-item">口试 (7/13)<span id="cd3" class="days">--</span></div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('p1-content')">📄 卷一 写作技巧 ▾</h2>
        <div id="p1-content">
            <div class="nav-group">
                <button class="nav-btn" onclick="route('q1', this)">私人电邮</button>
                <button class="nav-btn" onclick="route('q2', this)">公务电邮</button>
                <button class="nav-btn" onclick="route('q3', this)">记叙文</button>
                <button class="nav-btn" onclick="route('q4', this)">议论文</button>
                <button class="nav-btn" onclick="route('q5', this)">材料作文</button>
            </div>
            <div id="display-area"></div>
        </div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('vocab-content')">🏷️ 核心词语复习 ▾</h2>
        <div id="vocab-content">
            <div class="nav-group">
                <button class="nav-btn" onclick="renderVocab('random')">🎲 随机10个</button>
                <button class="nav-btn" onclick="renderVocab('all')">📋 全部显示</button>
            </div>
            <div id="vocab-display" class="vocab-grid"></div>
        </div>
    </div>

    <div id="data-status">载入文件中...</div>
</div>

<script src="data.js"></script>
<script src="data_q1.js"></script>
<script src="data_q2.js"></script>
<script src="data_q3.js"></script>
<script src="data_q4.js"></script>
<script src="data_q5.js"></script>
<script src="data_p2.js"></script>
<script src="data_p3l.js"></script>
<script src="data_p3o.js"></script>

<script>
    function toggleDiv(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    // --- 修复后的路由逻辑 ---
    function route(type, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        const area = document.getElementById('display-area');
        area.innerHTML = ''; 

        const data = window[type + 'Data']; 
        if (!data) {
            area.innerHTML = `<div style="padding:20px; color:red;">无法加载数据，请确认 data_${type}.js 格式正确。</div>`;
            return;
        }

        if (type === 'q1' || type === 'q2') {
            area.innerHTML = `<div class="paper-effect">${data.example || ""}${data.answer || ""}</div>`;
        } 
        else if (type === 'q3') { renderQ3Menu(data); }
        else if (type === 'q4') { renderQ4Menu(data); }
        else if (type === 'q5') { renderQ5Menu(data); }
    }

    function renderQ3Menu(data) {
        const area = document.getElementById('display-area');
        area.innerHTML = `
            <div class="nav-group" style="margin-top:10px;">
                <button class="nav-btn" onclick="showQ3Sub('tips')">💡 技巧</button>
                <button class="nav-btn" onclick="showQ3Sub('vocab')">📝 词库</button>
                <button class="nav-btn" onclick="showQ3Sub('essay')">📖 范文</button>
            </div>
            <div id="sub-area"></div>`;
        showQ3Sub('tips');
    }

    function showQ3Sub(sub) {
        const inner = document.getElementById('sub-area');
        const data = window.q3Data;
        if (sub === 'tips') {
            let h = `<div class="paper-effect"><b>小贴士：</b>${data.strategies.examTips}<hr>`;
            data.strategies.openings.forEach(o => { h += `<p><b>${o.title}</b><br>${o.example}</p>`; });
            inner.innerHTML = h + `</div>`;
        } else if (sub === 'vocab') {
            let h = `<div class="vocab-grid">`;
            [...data.traits, ...data.emotions].forEach(v => {
                h += `<div class="vocab-card" onclick="speak('${v.word}')"><span class="word">${v.word}</span><small>${v.pinyin}</small></div>`;
            });
            inner.innerHTML = h + `</div>`;
        } else {
            inner.innerHTML = `<div class="paper-effect"><h3>${data.modelEssay.title}</h3>${data.modelEssay.content}</div>`;
        }
    }

    function renderQ4Menu(data) {
        const area = document.getElementById('display-area');
        area.innerHTML = `<div class="nav-group" style="margin-top:10px;">
            <button class="nav-btn" onclick="showQ4Sub('review')">复习</button>
            <button class="nav-btn" onclick="showQ4Sub('opinion')">看法类</button>
        </div><div id="sub-area"></div>`;
        showQ4Sub('review');
    }

    function showQ4Sub(sub) {
        const inner = document.getElementById('sub-area');
        const d = window.q4Data[sub];
        if(!d) return;
        let h = `<div class="paper-effect"><h3>${d.title}</h3>`;
        if (sub === 'review') {
            d.elements.forEach(e => { h += `<p><b>${e.term}:</b> ${e.detail}</p>`; });
        } else {
            h += `<table><tr><th>步骤</th><th>内容</th></tr>`;
            d.framework.forEach(f => { h += `<tr><td>${f.step}</td><td>${f.detail}</td></tr>`; });
            h += `</table>`;
        }
        inner.innerHTML = h + `</div>`;
    }

    function renderQ5Menu(data) {
        const area = document.getElementById('display-area');
        area.innerHTML = `<div class="nav-group" style="margin-top:10px;">
            <button class="nav-btn" onclick="showQ5Sub('definition')">定义</button>
            <button class="nav-btn" onclick="showQ5Sub('argumentative')">议论</button>
        </div><div id="sub-area"></div>`;
        showQ5Sub('definition');
    }

    function showQ5Sub(sub) {
        const inner = document.getElementById('sub-area');
        const d = window.q5Data[sub];
        if(!d) return;
        if (sub === 'definition') {
            inner.innerHTML = `<div class="paper-effect"><h3>${d.title}</h3><ul>${d.rules.map(r => `<li>${r}</li>`).join('')}</ul></div>`;
        } else {
            inner.innerHTML = `<div class="paper-effect"><h3>${d.title}</h3><p>${d.example.material}</p></div>`;
        }
    }

    // --- 词语功能 (完全保留你的设计) ---
    function speak(text) {
        const m = new SpeechSynthesisUtterance(text);
        m.lang = 'zh-CN'; window.speechSynthesis.speak(m);
    }

    function renderVocab(mode) {
        const area = document.getElementById('vocab-display');
        area.innerHTML = '';
        let pool = [].concat(...Object.values(vocabData || {}));
        let list = (mode === 'random') ? pool.sort(() => 0.5 - Math.random()).slice(0, 10) : pool;
        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'vocab-card';
            card.innerHTML = `<span class="word">${item.word}</span><div class="det" style="display:none"><small>${item.pinyin}</small></div>`;
            card.onclick = function() {
                const d = this.querySelector('.det');
                d.style.display = d.style.display === 'none' ? 'block' : 'none';
                if(d.style.display === 'block') speak(item.word);
            };
            area.appendChild(card);
        });
    }

    window.onload = function() {
        const dates = { 'cd1': '2026-06-02', 'cd2': '2026-07-07', 'cd3': '2026-07-13' };
        for (let id in dates) {
            const diff = Math.ceil((new Date(dates[id]) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById(id).innerText = diff > 0 ? diff : 0;
        }
        document.getElementById('data-status').innerText = "✅ 数据提取功能已修复";
        route('q1');
    };
</script>
</body>
</html>
