<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文总复习 | Chinese Revision</title>
    <style>
        :root { --green: #27ae60; --dark: #2c3e50; --orange: #e67e22; --bg: #f4f7f6; }
        body { font-family: "PingFang SC", sans-serif; padding: 20px; background: var(--bg); color: var(--dark); line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .header-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; text-align: center; background: #f9fbf9; padding: 15px; border-radius: 12px; border: 1px solid #eef2f1; }
        .days { display: block; font-size: 22px; font-weight: bold; color: var(--orange); }

        .section-box { margin-bottom: 20px; padding: 20px; border-radius: 15px; border: 1px solid #eef2f1; background: #fff; }
        h2 { color: var(--green); border-left: 5px solid var(--green); padding-left: 15px; cursor: pointer; }
        
        .nav-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .nav-btn { padding: 8px 15px; border-radius: 8px; border: 1px solid var(--green); background: #fff; color: var(--green); cursor: pointer; font-weight: 600; }
        .nav-btn:hover, .nav-btn.active { background: var(--green); color: #fff; }

        .essay-box { background: #fff; padding: 20px; border: 1px solid #eee; border-radius: 10px; line-height: 1.8; margin-top: 10px; }
        .example-box { background: #fdf6e3; padding: 15px; border-radius: 10px; border-left: 4px solid var(--green); margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: var(--green); color: white; }

        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .vocab-card { padding: 12px; background: #fff; border: 1px solid #f1f2f6; border-radius: 10px; text-align: center; cursor: pointer; }
        .details { display: none; font-size: 13px; border-top: 1px dashed #eee; margin-top: 5px; padding-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 华文总复习</h1>

    <div class="header-box">
        <div>卷一/二<span id="cd1" class="days">--</span>天</div>
        <div>听力<span id="cd2" class="days">--</span>天</div>
        <div>口试<span id="cd3" class="days">--</span>天</div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('p1-content')">📄 卷一 写作部分 (P1)</h2>
        <div id="p1-content" style="display:none;">
            <div class="nav-group">
                <button class="nav-btn" onclick="route('q1', this)">Q1 私人电邮</button>
                <button class="nav-btn" onclick="route('q2', this)">Q2 公务电邮</button>
                <button class="nav-btn" onclick="route('q3', this)">Q3 记叙文</button>
                <button class="nav-btn" onclick="route('q4', this)">Q4 议论文</button>
            </div>
            <div id="display-area"></div>
        </div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('vocab-content')">🏷️ 词语复习 Vocabulary</h2>
        <div id="vocab-content">
            <select id="levelSelect" style="width:100%; padding:8px; margin-bottom:10px;">
                <option value="ALL">🌟 所有级别</option>
                <option value="Level 1">Level 1</option>
                <option value="Level 2">Level 2</option>
                <option value="Level 3">Level 3</option>
            </select>
            <div class="nav-group">
                <button class="nav-btn" onclick="renderVocab('random')">🎲 随机抽测</button>
                <button class="nav-btn" onclick="renderVocab('all')">📋 词语总览</button>
            </div>
            <div id="vocab-display" class="vocab-grid"></div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="data_q1.js"></script>
<script src="data_q2.js"></script>
<script src="data_q3.js"></script>
<script src="data_q4.js"></script>

<script>
    function toggleDiv(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    function route(type, btn) {
        const area = document.getElementById('display-area');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (type === 'q4') {
            renderQ4();
            return;
        }

        const data = window[type + 'Data'];
        if (!data) { area.innerHTML = "数据文件尚未加载。"; return; }

        if (type === 'q3') {
            area.innerHTML = `<div class="example-box"><b>题目：</b>${data.modelEssay.title}</div><div class="essay-box">${data.modelEssay.content}</div>`;
        } else {
            area.innerHTML = (data.example || "") + (data.answer || "");
        }
    }

    // --- Q4 专用渲染逻辑 ---
    function renderQ4() {
        const area = document.getElementById('display-area');
        area.innerHTML = `
            <div class="nav-group" style="background:#f9f9f9; padding:10px; border-radius:10px;">
                <button class="nav-btn" onclick="showQ4Part('review')">📚 总复习</button>
                <button class="nav-btn" onclick="showQ4Part('opinion')">💡 看法类</button>
                <button class="nav-btn" onclick="showQ4Part('suggestion')">🛠️ 建议类</button>
                <button class="nav-btn" onclick="showQ4Part('proscons')">⚖️ 利与弊</button>
            </div>
            <div id="q4-inner-area"></div>
        `;
        showQ4Part('review');
    }

    function showQ4Part(part) {
        const data = q4Data[part];
        const inner = document.getElementById('q4-inner-area');
        
        if (part === 'review') {
            let html = `<div class="essay-box"><h3>${data.title}</h3>`;
            data.elements.forEach(el => {
                html += `<p><b>${el.term}：</b>${el.detail}</p>`;
                if (el.methods) {
                    el.methods.forEach(m => {
                        html += `
                            <div style="border:1px solid #eee; padding:10px; margin:5px 0; border-radius:5px;">
                                <div style="color:var(--green); font-weight:bold; cursor:pointer;" onclick="toggleNext(this)">+ ${m.name} (点击展开例子)</div>
                                <div style="display:none; margin-top:8px;">
                                    <div class="example-box">${m.content}</div>
                                    <button class="nav-btn" style="font-size:11px;" onclick="toggleNext(this)">中英对照 (EN)</button>
                                    <div style="display:none; color:#666; font-size:13px; margin-top:5px; font-style:italic;">${m.english}</div>
                                </div>
                            </div>`;
                    });
                }
            });
            inner.innerHTML = html + "</div>";
        } else {
            let html = `<div class="essay-box"><h3>${data.title}</h3><b>典型例子：</b><ul>`;
            data.examples.forEach(ex => html += `<li>${ex}</li>`);
            html += `</ul><table><tr><th>阶段</th><th>内容详解</th></tr>`;
            data.framework.forEach(f => {
                html += `<tr><td><b>${f.step}</b><br><small>${f.en}</small></td><td>${f.detail}</td></tr>`;
            });
            inner.innerHTML = html + `</table></div>`;
        }
    }

    function toggleNext(btn) {
        const target = btn.nextElementSibling;
        target.style.display = (target.style.display === 'none') ? 'block' : 'none';
    }

    // --- 词语渲染逻辑 ---
    function renderVocab(mode) {
        const level = document.getElementById('levelSelect').value;
        const area = document.getElementById('vocab-display');
        area.innerHTML = '';
        let pool = (level === "ALL") ? [].concat(...Object.values(vocabData)) : (vocabData[level] || []);
        let list = (mode === 'random') ? [...pool].sort(() => 0.5 - Math.random()).slice(0, 10) : pool;

        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'vocab-card';
            card.onclick = function() {
                const d = this.querySelector('.details');
                d.style.display = (d.style.display === 'none') ? 'block' : 'none';
            };
            card.innerHTML = `<b>${item.word}</b><div class="details"><div style="color:var(--orange)">${item.pinyin}</div>${item.meaning}</div>`;
            area.appendChild(card);
        });
    }

    window.onload = function() {
        const dates = { 'cd1': '2026-06-02', 'cd2': '2026-07-07', 'cd3': '2026-07-13' };
        for (let id in dates) {
            const diff = Math.ceil((new Date(dates[id]) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById(id).innerText = diff > 0 ? diff : 0;
        }
    };
</script>
</body>
</html>
