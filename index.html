<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文总复习 | Chinese Revision</title>
    <style>
        :root {
            --bg-color: #d8e2dc; /* 豆沙绿背景 */
            --forest-green: #1b4332; /* 深林绿字体 */
            --sea-blue: #0077b6; /* 海蓝 */
            --brown: #6d4c41; /* 棕色 */
            --rose: #e91e63; /* 玫红倒计时 */
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--forest-green);
            padding: 20px;
            margin: 0;
            line-height: 1.6;
        }

        /* 磨砂玻璃容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { text-align: center; color: var(--forest-green); font-size: 2.2em; letter-spacing: 2px; }

        /* 倒计时：玫红色 */
        .header-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .cd-item {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--rose);
        }
        .days { display: block; font-size: 28px; font-weight: bold; color: var(--rose); }

        /* 板块盒子 */
        .section-box {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        h2 { color: var(--sea-blue); cursor: pointer; display: flex; justify-content: space-between; margin-top: 0; }

        /* 导航按钮 */
        .nav-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .nav-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid var(--forest-green);
            background: transparent;
            color: var(--forest-green);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--forest-green); color: white; }

        /* 词语卡片：配色区分 */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .vocab-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .vocab-card:hover { transform: scale(1.03); }
        .word { font-size: 24px; color: var(--forest-green); font-weight: bold; display: block; }
        .pinyin { color: var(--sea-blue); font-size: 16px; margin-top: 5px; display: block; }
        .meaning { color: var(--brown); font-size: 15px; display: block; margin-top: 3px; }

        /* 纸张效果：用于展示例子和范文 */
        .paper-effect {
            background: #fffcf2; /* 纸张米黄色 */
            padding: 25px;
            border-radius: 5px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1), inset 0 0 50px rgba(0,0,0,0.02);
            border: 1px solid #e0e0e0;
            position: relative;
            color: #333;
            font-size: 17px;
            line-height: 2;
            margin-top: 20px;
        }
        .paper-effect::before {
            content: "";
            position: absolute;
            top: 0; left: 40px; bottom: 0;
            width: 1px; background: #ffadad; /* 红色信纸线 */
        }

        .example-box { background: #e9edc9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--forest-green); margin-bottom: 15px; color: var(--brown); font-weight: 500; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        th, td { padding: 15px; border: 1px solid #eee; text-align: left; }
        th { background: var(--forest-green); color: white; }

        #data-status { font-size: 12px; color: var(--brown); text-align: center; margin-top: 30px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 华文总复习</h1>

    <div class="header-box">
        <div class="cd-item">卷一/二<span id="cd1" class="days">--</span></div>
        <div class="cd-item">听力 (7/7)<span id="cd2" class="days">--</span></div>
        <div class="cd-item">口试 (7/13)<span id="cd3" class="days">--</span></div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('p1-content')">📄 卷一 写作部分 <span>▼</span></h2>
        <div id="p1-content" style="display:none;">
            <div class="nav-group">
                <button class="nav-btn" onclick="route('q1', this)">Q1 私人电邮</button>
                <button class="nav-btn" onclick="route('q2', this)">Q2 公务电邮</button>
                <button class="nav-btn" onclick="route('q3', this)">Q3 记叙文</button>
                <button class="nav-btn" onclick="route('q4', this)">Q4 议论文</button>
                <button class="nav-btn" onclick="route('q5', this)">Q5 材料作文</button>
            </div>
            <div id="display-area"></div>
        </div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('vocab-content')">🏷️ 词语复习 Vocabulary</h2>
        <div id="vocab-content">
            <select id="levelSelect" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--forest-green); background: white;">
                <option value="ALL">🌟 所有级别 (Levels 1-3)</option>
                <option value="Level 1">Level 1</option>
                <option value="Level 2">Level 2</option>
                <option value="Level 3">Level 3</option>
            </select>
            <div class="nav-group">
                <button class="nav-btn" onclick="renderVocab('random')">🎲 随机学词</button>
                <button class="nav-btn" onclick="renderVocab('all')" style="background:var(--brown); color:white; border:none;">📋 词语总览 (卡片)</button>
            </div>
            <div id="vocab-display" class="vocab-grid"></div>
        </div>
    </div>

    <div id="data-status">系统初始化...</div>
</div>

<script src="data.js"></script>
<script src="data_q1.js"></script>
<script src="data_q2.js"></script>
<script src="data_q3.js"></script>
<script src="data_q4.js"></script>
<script src="data_q5.js"></script>

<script>
    // 基础显示切换
    function toggleDiv(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    // 统一路由逻辑 (最强兼容版)
    function route(type, btn) {
        const area = document.getElementById('display-area');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        // 特殊渲染器处理
        if (type === 'q4') { renderQ4(); return; }
        if (type === 'q5') { renderQ5(); return; }

        // 获取动态变量 q1Data, q2Data 等
        const data = window[type + 'Data'] || window[type.toUpperCase() + 'Data'];
        
        if (!data) {
            area.innerHTML = `<div class="example-box" style="color:red">找不到变量 ${type}Data，请检查 data_${type}.js 文件。</div>`;
            return;
        }

        if (type === 'q3') {
            area.innerHTML = `
                <div class="example-box"><b>题目：</b>${data.modelEssay.title}</div>
                <div class="paper-effect">${data.modelEssay.content}</div>`;
        } else {
            // Q1, Q2 通用：将内容包装进纸张效果
            area.innerHTML = `<div class="paper-effect">${(data.example || "") + (data.answer || "")}</div>`;
        }
    }

    // Q4 渲染器
    function renderQ4() {
        const area = document.getElementById('display-area');
        area.innerHTML = `
            <div class="nav-group" style="background:rgba(255,255,255,0.4); padding:10px; border-radius:15px;">
                <button class="nav-btn" onclick="showQ4Part('review')">📚 总复习</button>
                <button class="nav-btn" onclick="showQ4Part('opinion')">💡 看法类</button>
                <button class="nav-btn" onclick="showQ4Part('suggestion')">🛠️ 建议类</button>
                <button class="nav-btn" onclick="showQ4Part('proscons')">⚖️ 利与弊</button>
            </div>
            <div id="q4-inner"></div>`;
        showQ4Part('review');
    }

    function showQ4Part(part) {
        const data = q4Data[part];
        const inner = document.getElementById('q4-inner');
        if (part === 'review') {
            let html = `<div class="paper-effect"><h3>${data.title}</h3>`;
            data.elements.forEach(el => {
                html += `<p><b>${el.term}：</b>${el.detail}</p>`;
                if (el.methods) {
                    el.methods.forEach(m => {
                        html += `<div style="margin-left:20px; color:var(--brown)">● <i>${m.name}</i> <span style="cursor:pointer; color:var(--sea-blue)" onclick="toggleNext(this)">[点击看例子]</span>
                                <div style="display:none; font-size:14px; background:#fff; padding:10px; border-radius:5px;">${m.content}<br><small>${m.english}</small></div></div>`;
                    });
                }
            });
            inner.innerHTML = html + `</div>`;
        } else {
            let html = `<div class="paper-effect"><h3>${data.title}</h3><b>典型例子：</b><ul>`;
            data.examples.forEach(ex => html += `<li>${ex}</li>`);
            html += `</ul><table><tr><th>阶段</th><th>内容</th></tr>`;
            data.framework.forEach(f => { html += `<tr><td><b>${f.step}</b></td><td>${f.detail}</td></tr>`; });
            inner.innerHTML = html + `</table></div>`;
        }
    }

    // Q5 渲染器
    function renderQ5() {
        const area = document.getElementById('display-area');
        const d = q5Data;
        area.innerHTML = `
            <div class="paper-effect">
                <h3 style="color:var(--rose)">${d.definition.title}</h3>
                <p>${d.definition.desc}</p>
                <ul>${d.definition.rules.map(r => `<li>${r}</li>`).join('')}</ul>
            </div>
            <div class="nav-group">
                <button class="nav-btn" onclick="showQ5Part('arg')">✍️ 议论文类</button>
                <button class="nav-btn" onclick="showQ5Part('nar')">📖 记叙文类</button>
            </div>
            <div id="q5-inner"></div>`;
        showQ5Part('arg');
    }

    function showQ5Part(part) {
        const inner = document.getElementById('q5-inner');
        if (part === 'arg') {
            const arg = q5Data.argumentative;
            inner.innerHTML = `<div class="paper-effect"><h4>${arg.title}</h4>${arg.stepByStep.map(s => `<p><b>${s.step}:</b> ${s.detail}</p>`).join('')}<div class="example-box"><strong>${arg.example.title}</strong><br><small>${arg.example.material}</small></div></div>`;
        } else {
            const nar = q5Data.narrative;
            let html = `<div class="paper-effect"><h4>${nar.title}</h4>`;
            nar.types.forEach(t => {
                html += `<h5>${t.name}</h5><ul>${t.tips.map(tip => `<li>${tip}</li>`).join('')}</ul>`;
                t.cases.forEach(c => html += `<div class="example-box"><b>题目：${c.title}</b><br>⚠️ ${c.notice}</div>`);
            });
            inner.innerHTML = html + `</div>`;
        }
    }

    function toggleNext(el) {
        const t = el.nextElementSibling;
        t.style.display = t.style.display === 'none' ? 'block' : 'none';
    }

    // 词语卡片渲染逻辑 (带颜色区分)
    function renderVocab(mode) {
        const level = document.getElementById('levelSelect').value;
        const area = document.getElementById('vocab-display');
        area.innerHTML = '';
        let pool = (level === "ALL") ? [].concat(...Object.values(vocabData)) : (vocabData[level] || []);
        let list = (mode === 'random') ? [...pool].sort(() => 0.5 - Math.random()).slice(0, 10) : pool;

        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'vocab-card';
            card.onclick = function() {
                const det = this.querySelector('.details');
                const isH = det.style.display === 'none' || det.style.display === '';
                det.style.display = isH ? 'block' : 'none';
                if(isH) {
                    window.speechSynthesis.cancel();
                    const m = new SpeechSynthesisUtterance(item.word);
                    m.lang = 'zh-CN';
                    window.speechSynthesis.speak(m);
                }
            };
            card.innerHTML = `
                <span class="word">${item.word}</span>
                <div class="details" style="display:none">
                    <span class="pinyin">${item.pinyin}</span>
                    <span class="meaning">${item.meaning}</span>
                </div>`;
            area.appendChild(card);
        });
    }

    window.onload = function() {
        const dates = { 'cd1': '2026-06-02', 'cd2': '2026-07-07', 'cd3': '2026-07-13' };
        for (let id in dates) {
            const diff = Math.ceil((new Date(dates[id]) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById(id).innerText = diff > 0 ? diff : 0;
        }
        document.getElementById('data-status').innerText = "数据就绪，美术载入完毕。";
    };
</script>
</body>
</html>
