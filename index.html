<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文总复习 | Chinese Revision</title>
    <style>
        /* 采用你之前成功的样式 */
        body { font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; padding: 20px; background-color: #f4f7f6; color: #2c3e50; line-height: 1.8; }
        .container { max-width: 850px; margin: 20px auto; background: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #27ae60; }
        
        /* 倒计时 */
        .countdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; text-align: center; background: #f9fbf9; padding: 15px; border-radius: 12px; border: 1px solid #eef2f1; }
        .cd-item { font-size: 13px; color: #7f8c8d; }
        .days { display: block; font-size: 20px; font-weight: bold; color: #e67e22; }

        /* 语录 */
        #quote-container { text-align: center; margin-bottom: 30px; padding: 20px; border-radius: 12px; background: #fff; border: 1px dashed #27ae60; }
        #quote-text { font-size: 18px; color: #1e8449; font-weight: 500; }

        /* 板块 */
        .section-box { margin-bottom: 20px; padding: 20px; border-radius: 15px; background: #fff; border: 1px solid #eef2f1; }
        h2 { color: #27ae60; font-size: 1.2em; cursor: pointer; display: flex; justify-content: space-between; }
        
        /* 按钮导航 */
        .nav-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .nav-btn { padding: 10px 18px; border-radius: 8px; border: 1px solid #27ae60; background: white; color: #27ae60; cursor: pointer; font-weight: 600; }
        .nav-btn.active { background: #27ae60; color: white; }

        /* 词语卡片 */
        .vocab-card { padding: 20px; margin-top: 15px; background: #fdfdfd; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #f1f2f6; }
        .word { font-size: 30px; color: #2c3e50; }
        .details { display: none; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        
        /* 兼容 JS 内容 */
        .example-box, .essay-box { background: #fdf6e3; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid #27ae60; }
        #displayArea { margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 华文总复习</h1>

    <div class="countdown-grid">
        <div class="cd-item">卷一/二 (6/2)<span id="cd1" class="days">--</span></div>
        <div class="cd-item">听力 (7/7)<span id="cd2" class="days">--</span></div>
        <div class="cd-item">口试 (7/13)<span id="cd3" class="days">--</span></div>
    </div>

    <div id="quote-container">
        <div id="quote-text">读书破万卷，下笔如有神。</div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('p1-content')">📄 卷一 写作部分 <span>▼</span></h2>
        <div id="p1-content" style="display:none;">
            <div class="nav-group">
                <button class="nav-btn" onclick="showPaper('q1', this)">Q1 私人电邮</button>
                <button class="nav-btn" onclick="showPaper('q2', this)">Q2 公务电邮</button>
                <button class="nav-btn" onclick="showPaper('q3', this)">Q3 记叙文</button>
            </div>
            <div id="paper-display"></div>
        </div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('vocab-content')">🏷️ 词语复习 Vocabulary <span>▼</span></h2>
        <div id="vocab-content">
            <select id="levelSelect" style="width:100%; margin-bottom:10px;">
                <option value="ALL">🌟 所有级别</option>
                <option value="Level 1">Level 1</option>
                <option value="Level 2">Level 2</option>
                <option value="Level 3">Level 3</option>
            </select>
            <div class="nav-group">
                <button class="nav-btn" onclick="drawRandom()">🎲 随机学词</button>
                <button class="nav-btn" onclick="showAllVocab()" style="background:#34495e; color:white; border:none;">📋 查看总览</button>
            </div>
            <div id="vocab-display"></div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="data_q1.js"></script>
<script src="data_q2.js"></script>
<script src="data_q3.js"></script>

<script>
    // 1. 切换显示/隐藏
    function toggleDiv(id) {
        const x = document.getElementById(id);
        x.style.display = (x.style.display === "none") ? "block" : "none";
    }

    // 2. 卷一数据读取 (针对 Q1/Q2/Q3)
    function showPaper(type, btn) {
        const area = document.getElementById('paper-display');
        const btns = btn.parentElement.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 核心修复：对应你 JS 里的变量名 q1Data, q2Data, q3Data
        const data = window[type + 'Data']; 
        
        if (!data) {
            area.innerHTML = "尚未加载 " + type + " 数据文件。";
            return;
        }

        if (type === 'q3') {
            // Q3 是对象结构，特别处理
            area.innerHTML = `<div class="example-box"><b>范文题目：</b>${data.modelEssay.title}</div>
                             <div class="essay-box">${data.modelEssay.content}</div>`;
        } else {
            // Q1, Q2 结构处理：合并 example 和 answer
            area.innerHTML = (data.example || "") + (data.answer || "");
        }
    }

    // 3. 词语逻辑 (完全参考你成功的版本)
    function drawRandom() {
        if (typeof vocabData === 'undefined') { alert("词语数据未加载"); return; }
        
        let pool = [];
        const level = document.getElementById('levelSelect').value;
        if (level === "ALL") {
            Object.values(vocabData).forEach(arr => pool = pool.concat(arr));
        } else {
            pool = vocabData[level] || [];
        }

        const shuffled = [...pool].sort(() => 0.5 - Math.random()).slice(0, 10);
        const area = document.getElementById('vocab-display');
        area.innerHTML = '';
        
        shuffled.forEach(item => {
            const div = document.createElement('div');
            div.className = 'vocab-card';
            div.onclick = function() {
                const d = this.querySelector('.details');
                d.style.display = d.style.display === 'block' ? 'none' : 'block';
                // 自动朗读
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(item.word);
                msg.lang = 'zh-CN';
                window.speechSynthesis.speak(msg);
            };
            div.innerHTML = `<span class="word">${item.word}</span>
                             <div class="details">
                                <div style="color:#e67e22; font-weight:bold;">${item.pinyin}</div>
                                <div style="color:#7f8c8d;">${item.meaning}</div>
                             </div>`;
            area.appendChild(div);
        });
    }

    function showAllVocab() {
        const level = document.getElementById('levelSelect').value;
        let words = (level === "ALL") ? [].concat(...Object.values(vocabData)) : (vocabData[level] || []);
        
        let html = `<div style="background:#f9f9f9; padding:15px; border-radius:10px; max-height:400px; overflow-y:auto;">`;
        words.forEach(item => {
            html += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                        <strong>${item.word}</strong>
                        <span style="color:#7f8c8d; font-size:14px;">${item.pinyin} | ${item.meaning}</span>
                     </div>`;
        });
        document.getElementById('vocab-display').innerHTML = html + `</div>`;
    }

    // 4. 倒计时
    function setCD() {
        const dates = { 'cd1': '2026-06-02', 'cd2': '2026-07-07', 'cd3': '2026-07-13' };
        for (let id in dates) {
            const diff = Math.ceil((new Date(dates[id]) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById(id).innerText = diff > 0 ? diff : 0;
        }
    }

    window.onload = function() {
        setCD();
        console.log("数据检查:", { q1: window.q1Data, vocab: window.vocabData });
    };
</script>
</body>
</html>
