<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文总复习</title>
    <style>
        :root { --bg-color: #d8e2dc; --forest-green: #1b4332; --sea-blue: #0077b6; --rose: #e91e63; }
        body { font-family: "PingFang SC", sans-serif; background-color: var(--bg-color); padding: 20px; margin: 0; }
        .container { max-width: 950px; margin: 0 auto; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); padding: 30px; border-radius: 30px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        
        /* 倒计时：科目加粗，天数玫红色 */
        .header-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .cd-item { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #ddd; }
        .subject-title { font-weight: bold; font-size: 16px; display: block; }
        .days { display: block; font-size: 28px; font-weight: bold; color: var(--rose); margin-top: 5px; }

        .section-box { margin-bottom: 20px; padding: 20px; background: rgba(255, 255, 255, 0.3); border-radius: 20px; }
        .nav-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .nav-btn { padding: 8px 16px; border-radius: 10px; border: 2px solid var(--forest-green); background: white; color: var(--forest-green); cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: var(--forest-green); color: white; }

        /* 内容区样式适配 */
        .paper-effect { background: #fffcf2; padding: 25px; border-radius: 12px; border: 1px solid #e0e0e0; margin-top: 15px; min-height: 200px; }
        .example-box { background: #e9edc9; padding: 15px; border-radius: 8px; border-left: 5px solid var(--forest-green); margin-bottom: 15px; }
        .essay-box { background: white; padding: 15px; border-radius: 8px; border: 1px dashed var(--sea-blue); }
        .hl-yellow { background: #fff176; padding: 2px 4px; border-radius: 3px; }
        .bold-text { font-weight: bold; color: #000; }

        /* 词语网格 */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .vocab-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 华文总复习</h1>

    <div class="header-box">
        <div class="cd-item"><span class="subject-title"><b>卷一 & 卷二</b></span><span id="cd1" class="days">--天</span></div>
        <div class="cd-item"><span class="subject-title"><b>卷三 听力</b></span><span id="cd2" class="days">--天</span></div>
        <div class="cd-item"><span class="subject-title"><b>卷三 口试</b></span><span id="cd3" class="days">--天</span></div>
    </div>

    <div class="section-box">
        <div class="nav-group">
            <button class="nav-btn" onclick="loadModule('q1', this)">Q1 私人电邮</button>
            <button class="nav-btn" onclick="loadModule('q2', this)">Q2 公务电邮</button>
            <button class="nav-btn" onclick="loadModule('q3', this)">Q3 记叙文</button>
            <button class="nav-btn" onclick="loadModule('q4', this)">Q4 议论文</button>
            <button class="nav-btn" onclick="loadModule('q5', this)">Q5 材料作文</button>
        </div>
        <div id="main-display" class="paper-effect">请选择题型</div>
    </div>

    <div class="section-box">
        <h2 style="color: var(--sea-blue);">🏷️ 词语复习</h2>
        <div class="nav-group" id="grade-selector">
            </div>
        <div id="vocab-display" class="vocab-grid"></div>
    </div>
</div>

<script src="data.js"></script>
<script src="data_q1.js"></script>
<script src="data_q2.js"></script>
<script src="data_q3.js"></script>
<script src="data_q4.js"></script>
<script src="data_q5.js"></script>

<script>
    // 1. 题型加载逻辑
    function loadModule(type, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        
        const container = document.getElementById('main-display');
        
        // 尝试调用对应 JS 里的渲染函数 (如 renderQ1, renderQ2...)
        const funcName = "render" + type.toUpperCase();
        if (typeof window[funcName] === "function") {
            window[funcName](container);
        } else {
            // 如果没写函数，尝试直接读取 data 对象
            const data = window[type + "Data"];
            if (data) {
                container.innerHTML = (data.example || "") + (data.answer || "");
            } else {
                container.innerHTML = `<p style="color:red">错误：无法找到 ${type} 的内容或渲染函数。</p>`;
            }
        }
    }

    // 2. 词语学习：完全保留你的年级选择逻辑
    function initVocab() {
        const selector = document.getElementById('grade-selector');
        selector.innerHTML = '';
        if(!window.vocabData) return;

        // 生成年级按钮
        Object.keys(vocabData).forEach(grade => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = grade;
            btn.onclick = () => renderGrade(grade, btn);
            selector.appendChild(btn);
        });
        
        // 默认显示第一个年级
        if(selector.firstChild) selector.firstChild.click();
    }

    function renderGrade(grade, btn) {
        document.querySelectorAll('#grade-selector .nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const display = document.getElementById('vocab-display');
        display.innerHTML = '';
        
        vocabData[grade].forEach(item => {
            const card = document.createElement('div');
            card.className = 'vocab-card';
            card.innerHTML = `<b>${item.word}</b><br><small>${item.pinyin}</small>`;
            card.onclick = () => alert(`${item.word}\n${item.meaning}`);
            display.appendChild(card);
        });
    }

    // 3. 页面初始化
    window.onload = function() {
        // 倒计时
        const dates = { 'cd1': '2026-06-02', 'cd2': '2026-07-07', 'cd3': '2026-07-13' };
        for (let id in dates) {
            const diff = Math.ceil((new Date(dates[id]) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById(id).innerText = (diff > 0 ? diff : 0) + "天";
        }
        
        initVocab(); // 恢复年级选择
        loadModule('q1', document.querySelector('.nav-btn')); // 默认加载Q1
    };
</script>
</body>
</html>
