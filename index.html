<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文总复习</title>
    <style>
        :root {
            --bg-color: #d8e2dc; --forest-green: #1b4332; --sea-blue: #0077b6; 
            --rose: #e91e63; --glass: rgba(255, 255, 255, 0.85);
            --paper-bg: #fffcf2; --brown: #5d4037; --hl-yellow: #fff176;
            --ink: #2c3e50;
        }

        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background-color: var(--bg-color); color: var(--forest-green); padding: 20px; margin: 0; line-height: 1.8; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 30px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        
        h1 { text-align: center; color: var(--forest-green); font-size: 2.2em; margin-bottom: 30px; }

        /* 倒计时 */
        .header-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .cd-item { background: white; padding: 15px; border-radius: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .days { font-size: 28px; font-weight: bold; color: var(--rose); }

        /* 模块样式 */
        .section-box { margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,0.4); border-radius: 20px; border: 1px solid rgba(255,255,255,0.6); }
        h2 { color: var(--sea-blue); margin: 0; font-size: 1.4em; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
        h2:hover { color: var(--forest-green); }

        /* 导航按钮 */
        .nav-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .nav-btn { padding: 10px 16px; border-radius: 10px; border: 2px solid var(--forest-green); background: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn.active, .nav-btn:hover { background: var(--forest-green); color: white; }

        /* 词语学习布局 */
        .vocab-controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .full-width-select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--sea-blue); font-weight: bold; background: white; color: var(--sea-blue); font-size: 16px; }

        /* 内容折叠 */
        .content-toggle { display: none; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px; }
        .content-toggle.show { display: block; }

        /* 核心盒子样式 */
        .paper-effect { background: var(--paper-bg); padding: 25px; border-radius: 8px; box-shadow: 4px 4px 15px rgba(0,0,0,0.08); border-left: 8px solid var(--sea-blue); margin-top: 10px; color: var(--ink); }
        .example-box { border: 2px dashed #d1d1d1; padding: 18px; margin-bottom: 20px; background: #fdfdfd; border-radius: 10px; position: relative; }
        .example-box::before { content: "资料详情"; position: absolute; top: -12px; left: 15px; background: white; padding: 0 10px; font-size: 12px; color: #888; border: 1px solid #ddd; border-radius: 4px; }
        .essay-box { background: white; padding: 18px; border-radius: 10px; border: 1px solid #eee; line-height: 2; }

        /* 范文雅致格式 */
        .model-essay-paper { background: #fffef9; padding: 40px; border: 1px solid #e0d8c3; box-shadow: 2px 2px 10px rgba(0,0,0,0.05); position: relative; }
        .model-essay-title { font-size: 1.2em; font-weight: bold; color: var(--brown); border-bottom: 2px solid var(--brown); padding-bottom: 10px; margin-bottom: 20px; display: block; }
        .model-essay-content { font-size: 18px; color: #333; line-height: 2.2; text-align: justify; }

        /* 文本修饰 */
        .hl-yellow { background: var(--hl-yellow); padding: 2px 6px; border-radius: 3px; font-weight: bold; box-shadow: 2px 2px 0 rgba(0,0,0,0.05); }
        .bold-text { font-weight: 800; color: #000; }
        .ch-space { display: inline-block; min-width: 4em; border-bottom: 2px solid #333; margin: 0 5px; vertical-align: bottom; }

        /* 词语卡片 */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 10px; }
        .vocab-card { background: white; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #efefef; }
        .word { font-size: 19px; color: var(--forest-green); font-weight: bold; }
        .det { margin-top: 8px; border-top: 1px dotted #ccc; padding-top: 8px; font-size: 13px; color: var(--brown); }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 华文总复习</h1>

    <div class="header-box">
        <div class="cd-item"><b>卷一 & 卷二</b><div>还有 <span id="cd1" class="days">--</span> 天</div></div>
        <div class="cd-item"><b>卷三 听力</b><div>还有 <span id="cd2" class="days">--</span> 天</div></div>
        <div class="cd-item"><b>卷三 口试</b><div>还有 <span id="cd3" class="days">--</span> 天</div></div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleSection('writing-content')">📄 卷一 写作技巧 <span>展开/收起</span></h2>
        <div id="writing-content" class="content-toggle">
            <div class="nav-group main-nav">
                <button class="nav-btn" onclick="route('q1', this)">Q1 私人电邮</button>
                <button class="nav-btn" onclick="route('q2', this)">Q2 公务电邮</button>
                <button class="nav-btn" onclick="route('q3', this)">Q3 记叙文</button>
                <button class="nav-btn" onclick="route('q4', this)">Q4 议论文</button>
                <button class="nav-btn" onclick="route('q5', this)">Q5 材料作文</button>
            </div>
            <div id="display-area"></div>
        </div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleSection('p2-content')">📖 卷二 语文应用与阅读 <span>展开/收起</span></h2>
        <div id="p2-content" class="content-toggle">
            <div class="nav-group p2-nav">
                <button class="nav-btn" onclick="routeP2('reading_tips', this)">💡 阅读技巧</button>
                <button class="nav-btn" onclick="routeP2('vocab_app', this)">✍️ 填空与替换</button>
                <button class="nav-btn" onclick="routeP2('mcq', this)">🎯 阅读(一) MCQ</button>
                <button class="nav-btn" onclick="routeP2('open_ended', this)">📝 阅读(二) 简答</button>
                <button class="nav-btn" onclick="routeP2('rhetoric', this)">✨ 修辞手法</button>
                <button class="nav-btn" onclick="routeP2('expository', this)">ℹ️ 说明文</button>
                <button class="nav-btn" onclick="routeP2('character', this)">👤 人物描写</button>
            </div>
            <div id="p2-display-area"></div>
        </div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleSection('vocab-content')">🏷️ 词语学习 <span>展开/收起</span></h2>
        <div id="vocab-content" class="content-toggle">
            <div class="vocab-controls">
                <select id="grade-select" class="full-width-select" onchange="renderVocab('all')">
                    <option value="all">所有年级 (All Levels)</option>
                    <option value="Level 1">一年级 (Level 1)</option>
                    <option value="Level 2">二年级 (Level 2)</option>
                    <option value="Level 3">三年级 (Level 3)</option>
                </select>
                <div class="nav-group">
                    <button class="nav-btn" style="flex:1" onclick="renderVocab('all')">👁️ 学习全部</button>
                    <button class="nav-btn" style="flex:1" onclick="renderVocab('random')">🎲 随机10个</button>
                </div>
            </div>
            <div id="vocab-display" class="vocab-grid"></div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="data_q1.js"></script>
<script src="data_q2.js"></script>
<script src="data_q3.js"></script>
<script src="data_q4.js"></script>
<script src="data_q5.js"></script>
<script src="data_p2.js"></script>

<script>
"use strict";

let currentQ = null;
let currentP2 = null;

function toggleSection(id) {
    document.getElementById(id).classList.toggle('show');
}

function format(text) {
    if(!text) return "";
    return text.replace(/＿{2,}/g, '<span class="ch-space"></span>');
}

// 卷一路由逻辑
function route(type, btn) {
    const area = document.getElementById('display-area');
    if (currentQ === type) {
        area.style.display = 'none';
        btn.classList.remove('active');
        currentQ = null;
        return;
    }
    area.style.display = 'block';
    document.querySelectorAll('.main-nav .nav-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    currentQ = type;

    if (type === 'q1' || type === 'q2') {
        const data = (type === 'q1') ? q1Data : q2Data;
        area.innerHTML = `<div class="paper-effect"><h3>${data.title}</h3>${format(data.example)}${format(data.answer)}</div>`;
    } 
    else if (type === 'q3') renderQ3();
    else if (type === 'q4') renderQ4();
    else if (type === 'q5') renderQ5();
}

// 卷二路由逻辑 (精准照搬 p2Data)
function routeP2(mode, btn) {
    const area = document.getElementById('p2-display-area');
    if (currentP2 === mode) {
        area.style.display = 'none';
        btn.classList.remove('active');
        currentP2 = null;
        return;
    }
    area.style.display = 'block';
    document.querySelectorAll('.p2-nav .nav-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    currentP2 = mode;

    let h = '<div class="paper-effect">';
    if(mode === 'reading_tips') {
        const d = p2Data.readingTips;
        h += `<h3>${d.title}</h3><p style="color:var(--rose); font-weight:bold;">${d.subtitle}</p>`;
        d.steps.forEach(s => h += `<p><b>${s.step}</b>：${s.detail}</p>`);
    }
    else if(mode === 'vocab_app') {
        const c = p2Data.clozeAndReplacement.cloze;
        const r = p2Data.clozeAndReplacement.replacement;
        h += `<div class="example-box"><h3>${c.title}</h3><p>${c.time}</p><p><b>题型说明：</b><br>${c.desc}</p><ul>${c.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
        h += `<div class="example-box"><h3>${r.title}</h3><p>${r.time}</p><p><b>题型说明：</b><br>${r.desc}</p><ul>${r.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
    }
    else if(mode === 'mcq') {
        const d = p2Data.comp1;
        h += `<h3>${d.title}</h3><p>${d.time}</p><p><b>题型说明：</b><br>${d.desc}</p><ul>${d.tips.map(t=>`<li>${t}</li>`).join('')}</ul>`;
    }
    else if(mode === 'open_ended') {
        const d = p2Data.comp2;
        h += `<h3>${d.title}</h3><p>${d.time}</p><p><b>题型说明：</b><br>${d.desc}</p><ul>${d.tips.map(t=>`<li>${t}</li>`).join('')}</ul><hr>`;
        d.commonQuestions.forEach(q => h += `<div class="example-box"><b>问：${q.q}</b><br><b>答：</b>${q.a}</div>`);
        h += `<p style="color:var(--rose); font-weight:bold;">${d.remind}</p><hr><h4>对照表：</h4><div class="vocab-grid">`;
        d.requirementVocab.forEach(v => h += `<div class="vocab-card"><b>${v.cn}</b><br><small>${v.en}</small></div>`);
        h += `</div>`;
    }
    else if(mode === 'rhetoric') {
        p2Data.rhetoric.forEach(r => h += `<div class="example-box"><b>${r.name}</b><br><small>${r.desc}</small><ul>${r.examples.map(ex=>`<li>${ex}</li>`).join('')}</ul></div>`);
    }
    else if(mode === 'expository') {
        h += `<h3>说明顺序</h3>` + p2Data.expository.orders.map(o=>`<p><b>${o.type}</b><br>${o.detail}</p>`).join('');
        h += `<hr><h3>说明方法</h3>` + p2Data.expository.methods.map(m=>`<p><b>${m.name}</b><br>${m.detail}</p>`).join('');
    }
    else if(mode === 'character') {
        h += `<table><tr><th>描写手法</th><th>作用</th><th>例子</th><th>分析</th></tr>`;
        p2Data.characterPortrayal.forEach(c => h += `<tr><td><b>${c.type}</b></td><td>${c.effect}</td><td>${c.example}</td><td>${c.analysis}</td></tr>`);
        h += `</table>`;
    }
    area.innerHTML = h + '</div>';
}

// Q3/Q4/Q5 逻辑 (保持你的原始分门别类用意)
function renderQ3() {
    let html = `<div class="nav-group" style="margin-top:10px;">
        <button class="nav-btn active" onclick="showQ3Sub('tips', this)">💡 开头技巧</button>
        <button class="nav-btn" onclick="showQ3Sub('ending', this)">🎯 结尾感悟</button>
        <button class="nav-btn" onclick="showQ3Sub('traits', this)">🧠 性格词库</button>
        <button class="nav-btn" onclick="showQ3Sub('emotions', this)">🎭 情感词库</button>
        <button class="nav-btn" onclick="showQ3Sub('common', this)">🏢 常见词语</button>
        <button class="nav-btn" onclick="showQ3Sub('essay', this)">📖 优雅范文</button>
    </div><div id="q3-sub-area"></div>`;
    document.getElementById('display-area').innerHTML = html;
    showQ3Sub('tips');
}

function showQ3Sub(mode, btn) {
    if(btn) { btn.parentElement.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    const sub = document.getElementById('q3-sub-area');
    let h = '';
    if(mode === 'tips') {
        h = '<div class="paper-effect"><b>💡 考场建议：</b>' + q3Data.strategies.examTips + '<hr>';
        q3Data.strategies.openings.forEach(o => { h += `<p><b style="color:var(--sea-blue)">${o.title}</b><br>${format(o.example)}<br><i style="color:#666; font-size:14px;">${o.case || ""}</i></p>`; });
        h += '</div>';
    } else if(mode === 'ending') {
        h = '<div class="paper-effect">';
        q3Data.strategies.conclusions.forEach((c, idx) => { h += `<p><b>${idx+1}. ${c.title}：</b><br><span style="display:block; margin-top:5px; color:#444;">${c.content}</span></p>`; });
        h += '</div>';
    } else if(['traits', 'emotions', 'common'].includes(mode)) {
        const pool = mode === 'traits' ? q3Data.traits : (mode === 'emotions' ? q3Data.emotions : q3Data.commonVocab);
        h = `<div class="vocab-grid">`;
        pool.forEach(v => { h += `<div class="vocab-card" onclick="toggleCard(this, '${v.word}')"><span class="word">${v.word}</span><div class="det" style="display:none"><i>${v.pinyin}</i><br><b>${v.meaning}</b></div></div>`; });
        h += `</div>`;
    } else if(mode === 'essay') {
        h = `<div class="model-essay-paper"><span class="model-essay-title">${q3Data.modelEssay.title}</span><div class="model-essay-content">${format(q3Data.modelEssay.content)}</div></div>`;
    }
    sub.innerHTML = h;
}

function renderQ4() {
    let html = `<div class="nav-group" style="margin-top:10px;"><button class="nav-btn active" onclick="showQ4Sub('review', this)">📚 三要素</button><button class="nav-btn" onclick="showQ4Sub('opinion', this)">💬 看法类</button></div><div id="q4-sub-area"></div>`;
    document.getElementById('display-area').innerHTML = html;
    showQ4Sub('review');
}

function showQ4Sub(mode, btn) {
    if(btn) { btn.parentElement.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    const sub = document.getElementById('q4-sub-area');
    const d = q4Data[mode];
    let h = '<div class="paper-effect">';
    if(mode === 'review') {
        d.elements.forEach(e => {
            h += `<p><b>${e.term}</b>：${e.detail}</p>`;
            if(e.methods) e.methods.forEach(m => h += `<div class="example-box"><b>${m.name}</b>：<br>${m.content}</div>`);
        });
    } else {
        h += `<h3>${d.title}</h3><table><tr><th>步骤</th><th>详情</th></tr>`;
        d.framework.forEach(f => h += `<tr><td><b>${f.step}</b></td><td>${f.detail}</td></tr>`);
        h += `</table>`;
    }
    sub.innerHTML = h + '</div>';
}

function renderQ5() {
    let html = `<div class="nav-group" style="margin-top:10px;"><button class="nav-btn active" onclick="showQ5Sub('definition', this)">❓ 定义</button><button class="nav-btn" onclick="showQ5Sub('argumentative', this)">📑 议论型</button></div><div id="q5-sub-area"></div>`;
    document.getElementById('display-area').innerHTML = html;
    showQ5Sub('definition');
}

function showQ5Sub(mode, btn) {
    if(btn) { btn.parentElement.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    const sub = document.getElementById('q5-sub-area');
    const d = q5Data[mode];
    let h = '<div class="paper-effect">';
    if(mode === 'definition') { h += `<h3>${d.title}</h3><ul>${d.rules.map(r=>`<li>${r}</li>`).join('')}</ul>`; }
    else { h += `<h3>${d.title}</h3><div class="example-box"><b>材料：</b><br>${format(d.example.material)}</div><p><b>用法：</b><br>${d.example.usage}</p>`; }
    sub.innerHTML = h + '</div>';
}

function toggleCard(el, word) {
    const d = el.querySelector('.det');
    const isShowing = d.style.display === 'block';
    d.style.display = isShowing ? 'none' : 'block';
    if(!isShowing) { const msg = new SpeechSynthesisUtterance(word); msg.lang = "zh-CN"; window.speechSynthesis.speak(msg); }
}

function renderVocab(mode) {
    const area = document.getElementById('vocab-display');
    const lv = document.getElementById('grade-select').value;
    area.innerHTML = "";
    if(typeof vocabData === 'undefined') return;
    let pool = [];
    if(lv === 'all') Object.keys(vocabData).forEach(k => pool = pool.concat(vocabData[k]));
    else pool = vocabData[lv] || [];
    let list = mode === 'random' ? [...pool].sort(()=>0.5-Math.random()).slice(0,10) : pool;
    list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'vocab-card';
        card.onclick = () => toggleCard(card, item.word);
        card.innerHTML = `<span class="word">${item.word}</span><div class="det" style="display:none"><i>${item.pinyin}</i><br><b>${item.meaning}</b></div>`;
        area.appendChild(card);
    });
}

window.onload = function() {
    const dates = { cd1: '2026-06-02', cd2: '2026-07-07', cd3: '2026-07-13' };
    for (let id in dates) {
        const diff = Math.ceil((new Date(dates[id]) - new Date()) / (1000 * 60 * 60 * 24));
        const el = document.getElementById(id);
        if(el) el.innerText = diff > 0 ? diff : 0;
    }
};
</script>
</body>
</html>
