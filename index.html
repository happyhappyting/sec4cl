<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华文总复习 | happyhappyting</title>
    <style>
        :root {
            --bg-color: #d8e2dc; 
            --forest-green: #1b4332; 
            --sea-blue: #0077b6; 
            --rose: #e91e63; /* 玫红色 */
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--forest-green);
            padding: 20px; margin: 0;
        }

        .container {
            max-width: 900px; margin: 0 auto;
            background: var(--glass); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); padding: 25px;
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { text-align: center; color: var(--forest-green); margin-bottom: 25px; }

        /* 倒计时样式 - 严格按要求修改 */
        .header-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .cd-item { 
            background: white; padding: 15px; border-radius: 15px; 
            text-align: center; border: 1px solid #eee;
        }
        .subject-title { font-weight: bold; font-size: 15px; color: #333; display: block; }
        .days { 
            display: block; font-size: 26px; font-weight: bold; 
            color: var(--rose); /* 玫红色 */
            margin-top: 5px;
        }

        /* 导航 */
        .section-box { margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.4); border-radius: 15px; }
        h2 { color: var(--sea-blue); cursor: pointer; font-size: 1.3em; margin: 0 0 10px 0; }
        .nav-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        
        .nav-btn { 
            padding: 8px 15px; border-radius: 8px; border: 2px solid var(--forest-green); 
            background: white; color: var(--forest-green); cursor: pointer; font-weight: bold;
        }
        .nav-btn.active { background: var(--forest-green); color: white; }

        /* 纸张展示区 */
        .paper-effect {
            background: #fffcf2; padding: 20px; border-radius: 10px;
            border: 1px solid #e0e0e0; color: #333; font-size: 16px;
            line-height: 1.8; white-space: pre-wrap; margin-top: 10px;
            min-height: 100px;
        }

        .hl-yellow { background: #fff176; padding: 2px 4px; border-radius: 3px; }
        .bold-text { font-weight: bold; }

        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .vocab-card { background: white; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .word { font-size: 18px; font-weight: bold; color: var(--forest-green); }

        #data-status { font-size: 11px; text-align: center; margin-top: 20px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 华文总复习</h1>

    <div class="header-box">
        <div class="cd-item">
            <span class="subject-title"><b>卷一 & 卷二</b></span>
            <span id="cd1" class="days">--天</span>
        </div>
        <div class="cd-item">
            <span class="subject-title"><b>卷三 听力</b></span>
            <span id="cd2" class="days">--天</span>
        </div>
        <div class="cd-item">
            <span class="subject-title"><b>卷三 口试</b></span>
            <span id="cd3" class="days">--天</span>
        </div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('p1-content')">📄 卷一 写作 (Q1-Q5) ▾</h2>
        <div id="p1-content">
            <div class="nav-group">
                <button class="nav-btn" onclick="route('q1', this)">私人电邮</button>
                <button class="nav-btn" onclick="route('q2', this)">公务电邮</button>
                <button class="nav-btn" onclick="route('q3', this)">记叙文</button>
                <button class="nav-btn" onclick="route('q4', this)">议论文</button>
                <button class="nav-btn" onclick="route('q5', this)">材料作文</button>
            </div>
            <div id="display-area"></div>
        </div>
    </div>

    <div class="section-box">
        <h2 onclick="toggleDiv('vocab-content')">🏷️ 词语复习 ▾</h2>
        <div id="vocab-content">
            <div class="nav-group">
                <button class="nav-btn" onclick="renderVocab('random')">🎲 随机10个</button>
                <button class="nav-btn" onclick="renderVocab('all')">📋 全部显示</button>
            </div>
            <div id="vocab-display" class="vocab-grid"></div>
        </div>
    </div>

    <div id="data-status">正在连接数据文件...</div>
</div>

<script src="data.js"></script>
<script src="data_q1.js"></script>
<script src="data_q2.js"></script>
<script src="data_q3.js"></script>
<script src="data_q4.js"></script>
<script src="data_q5.js"></script>
<script src="data_p2.js"></script>
<script src="data_p3l.js"></script>
<script src="data_p3o.js"></script>

<script>
    function toggleDiv(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    // 路由函数
    function route(type, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        const area = document.getElementById('display-area');
        area.innerHTML = '<p>正在提取内容...</p>'; 

        // 容错读取：尝试读取 q1Data, q2Data 等
        const data = window[type + 'Data']; 

        if (!data) {
            area.innerHTML = `<div class="paper-effect" style="color:red">
                ❌ 找不到数据变量：${type}Data<br>
                请检查 data_${type}.js 内部第一行是否写成：const ${type}Data = { ... }
            </div>`;
            return;
        }

        if (type === 'q1' || type === 'q2') {
            area.innerHTML = `<div class="paper-effect">${data.example || ""}${data.answer || ""}</div>`;
        } 
        else if (type === 'q3') { renderQ3(data); }
        else if (type === 'q4') { renderQ4(data); }
        else if (type === 'q5') { renderQ5(data); }
    }

    function renderQ3(data) {
        document.getElementById('display-area').innerHTML = `
            <div class="nav-group" style="margin-top:10px;">
                <button class="nav-btn" onclick="showSub('q3', 'tips')">技巧</button>
                <button class="nav-btn" onclick="showSub('q3', 'vocab')">词库</button>
                <button class="nav-btn" onclick="showSub('q3', 'essay')">范文</button>
            </div>
            <div id="sub-area" class="paper-effect"></div>`;
        showSub('q3', 'tips');
    }

    function renderQ4(data) {
        document.getElementById('display-area').innerHTML = `
            <div class="nav-group" style="margin-top:10px;">
                <button class="nav-btn" onclick="showSub('q4', 'review')">三要素</button>
                <button class="nav-btn" onclick="showSub('q4', 'opinion')">看法类</button>
                <button class="nav-btn" onclick="showSub('q4', 'suggestion')">建议类</button>
            </div>
            <div id="sub-area" class="paper-effect"></div>`;
        showSub('q4', 'review');
    }

    function renderQ5(data) {
        document.getElementById('display-area').innerHTML = `
            <div class="nav-group" style="margin-top:10px;">
                <button class="nav-btn" onclick="showSub('q5', 'definition')">定义</button>
                <button class="nav-btn" onclick="showSub('q5', 'argumentative')">议论文类</button>
                <button class="nav-btn" onclick="showSub('q5', 'narrative')">记叙文类</button>
            </div>
            <div id="sub-area" class="paper-effect"></div>`;
        showSub('q5', 'definition');
    }

    function showSub(mainType, subType) {
        const data = window[mainType + 'Data'];
        const inner = document.getElementById('sub-area');
        if(!data || !data[subType]) return;

        let content = "";
        const d = data[subType];

        if (mainType === 'q3') {
            if (subType === 'tips') content = `<b>建议：</b>${d.examTips}`;
            else if (subType === 'essay') content = `<b>${d.title}</b><br>${d.content}`;
            else content = "点击词语卡片复习";
        } 
        else if (mainType === 'q4') {
            content = `<h3>${d.title}</h3>`;
            if (subType === 'review') d.elements.forEach(e => content += `<p><b>${e.term}:</b> ${e.detail}</p>`);
            else d.framework.forEach(f => content += `<p><b>${f.step}:</b> ${f.detail}</p>`);
        }
        else if (mainType === 'q5') {
            content = `<h3>${d.title}</h3>`;
            if (subType === 'definition') content += `<ul>${d.rules.map(r=>`<li>${r}</li>`).join('')}</ul>`;
            else content += `<p>查看 data_q5.js 详细内容</p>`;
        }
        inner.innerHTML = content;
    }

    function renderVocab(mode) {
        const area = document.getElementById('vocab-display');
        area.innerHTML = '';
        if(!window.vocabData) return;
        let pool = [].concat(...Object.values(vocabData));
        let list = (mode === 'random') ? pool.sort(() => 0.5 - Math.random()).slice(0, 10) : pool;
        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'vocab-card';
            card.innerHTML = `<span class="word">${item.word}</span>`;
            card.onclick = () => {
                const m = new SpeechSynthesisUtterance(item.word);
                m.lang = 'zh-CN'; window.speechSynthesis.speak(m);
                alert(`${item.word}\n${item.pinyin}\n${item.meaning}`);
            };
            area.appendChild(card);
        });
    }

    window.onload = function() {
        const dates = { 'cd1': '2026-06-02', 'cd2': '2026-07-07', 'cd3': '2026-07-13' };
        for (let id in dates) {
            const diff = Math.ceil((new Date(dates[id]) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById(id).innerText = (diff > 0 ? diff : 0) + "天";
        }
        document.getElementById('data-status').innerText = "^^";
        route('q1');
    };
</script>
</body>
</html>
